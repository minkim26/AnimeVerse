name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: anime-verse-backend
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: animeverse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:4
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 5
    env:
      POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/animeverse
      JWT_SECRET: test-secret
      FRONTEND_URL: http://localhost:5173
      REDIS_URL: redis://localhost:6379
      RABBITMQ_URL: amqp://localhost
      SUPABASE_URL: https://fake.supabase.co
      SUPABASE_KEY: fake-key
      PORT: 8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: anime-verse-backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - run: npm run initdb
      - run: npm test
